version: '3.8'

services:
  n8n-postgres:
    image: postgres:17-alpine
    container_name: n8n-postgres
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: "n8nPassw0rd"
      POSTGRES_DB: n8n
    volumes:
      - n8n_pgdata:/var/lib/postgresql/data
    networks:
      - n8n-net

  n8n-runners:
    image: n8nio/runners:2.13.3
    container_name: n8n-runners
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=6UftZHUQlAX7n5gbMvQzjfXXc4KR7SHN
    depends_on:
      - n8n
    networks:
      - n8n-net

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.13.3
    restart: always
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8nPassw0rd
      - WEBHOOK_URL=https://YOUR_N8N_URL/
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - NODE_ENV=production
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${GENERIC_TIMEZONE}
      - N8N_SECURE_COOKIE=false
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_SOURCE_CONTROL_ENABLED=true
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=6UftZHUQlAX7n5gbMvQzjfXXc4KR7SHN
      - N8N_NATIVE_PYTHON_RUNNER=true
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./local-files:/files
    networks:
      - n8n-net
    depends_on:
      - n8n-postgres

  nginx-knox:
    image: nginx:alpine
    container_name: nginx-knox
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/knox-ui.js:/usr/share/nginx/html/custom-assets/knox-ui.js:ro
      - ./nginx/knox-modal.css:/usr/share/nginx/html/custom-assets/knox-modal.css:ro
    networks:
      - n8n-net
    depends_on:
      - n8n

  # ═══════════════════════════════════════════════════════════════════════════
  # KNOX — IAM Gateway (Identity & Access Management Reverse Proxy)
  # ═══════════════════════════════════════════════════════════════════════════
  knox-proxy:
    image: ghcr.io/omidiyanto/knox-proxy:latest
    container_name: knox-proxy
    restart: always
    ports:
      - "8443:8443"
    environment:
      # --- Core ---
      - PROXY_PORT=8443
      - N8N_BACKEND_URL=http://nginx-knox:80
      - N8N_INTERNAL_URL=http://n8n:5678
      # --- OIDC / Keycloak ---
      - OIDC_ISSUER_URL=${OIDC_ISSUER_URL}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-n8n-proxy}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_REDIRECT_URL=${OIDC_REDIRECT_URL:-http://localhost:8443/auth/callback}
      # --- Team Mapping ---
      - KEYCLOAK_GROUP_PREFIX=${KEYCLOAK_GROUP_PREFIX:-/n8n-prod-}
      - N8N_TEAM_CREDENTIALS=${N8N_TEAM_CREDENTIALS}
      # --- Security ---
      - DANGEROUS_NODES=${DANGEROUS_NODES:-}
      - DANGEROUS_NODES_FILE=${DANGEROUS_NODES_FILE:-}
      # --- Vault (Optional) ---
      - ENABLE_VAULT=${ENABLE_VAULT:-false}
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
      - VAULT_SECRET_PATH=${VAULT_SECRET_PATH:-secret/data/knox/n8n_teams}
      # --- JIT Ticketing ---
      - JIT_DATABASE_URL=postgres://knox:${KNOX_DB_PASSWORD:-knoxSecurePass}@knox-db:5432/knox?sslmode=disable
      - JIT_WEBHOOK_URL=${JIT_WEBHOOK_URL:-}
      - JIT_MAX_DURATION_DAYS=${JIT_MAX_DURATION_DAYS:-7}
      - KNOX_API_KEY=${KNOX_API_KEY:-}
      - KNOX_API_KEY_VAULT_PATH=${KNOX_API_KEY_VAULT_PATH:-secret/data/knox/config}
      - KNOX_API_KEY_VAULT_FIELD=${KNOX_API_KEY_VAULT_FIELD:-knox_api_key}
      # --- Advanced ---
      - COOKIE_TTL=${COOKIE_TTL:-3600}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE:-3600}
    volumes:
      - ./dangerous-nodes.yaml:/app/dangerous-nodes.yaml:ro
    networks:
      - n8n-net
    depends_on:
      - n8n
      - nginx-knox
      - knox-db

  # ═══════════════════════════════════════════════════════════════════════════
  # KNOX DB — PostgreSQL for JIT Ticketing
  # ═══════════════════════════════════════════════════════════════════════════
  knox-db:
    image: postgres:17-alpine
    container_name: knox-db
    restart: always
    environment:
      POSTGRES_USER: knox
      POSTGRES_PASSWORD: "${KNOX_DB_PASSWORD:-knoxSecurePass}"
      POSTGRES_DB: knox
    volumes:
      - knox_pgdata:/var/lib/postgresql/data
    networks:
      - n8n-net

volumes:
  n8n_data:
  n8n_pgdata:
  knox_pgdata:

networks:
  n8n-net:
    driver: bridge


