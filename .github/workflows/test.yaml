name: Knox Automated Tests

on:
  workflow_dispatch:
    inputs:
      n8n_version:
        description: 'n8n version to test against (e.g., 2.13.3, latest)'
        required: true
        default: '2.13.3'
        type: string
      test_scope:
        description: 'Which tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - e2e

env:
  N8N_VERSION: ${{ github.event.inputs.n8n_version }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Go Unit Tests
  # ═══════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: '🧪 Unit Tests'
    if: inputs.test_scope == 'all' || inputs.test_scope == 'unit'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: knox-proxy/go.mod

      - name: Download dependencies
        working-directory: knox-proxy
        run: go mod download

      - name: Run unit tests
        working-directory: knox-proxy
        run: |
          go test -v -race -count=1 -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-coverage
          path: knox-proxy/coverage.out
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Integration Tests
  # ═══════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: '🔗 Integration Tests (n8n ${{ inputs.n8n_version }})'
    if: inputs.test_scope == 'all' || inputs.test_scope == 'integration'
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: knox-proxy/go.mod

      - name: Start test environment
        working-directory: tests
        run: |
          echo "📦 Starting Knox test stack with n8n ${N8N_VERSION}..."
          docker compose -f docker-compose.test.yaml up -d --build

      - name: Wait for services
        working-directory: tests
        run: bash scripts/wait-for-services.sh

      - name: Setup Vault
        working-directory: tests
        run: bash scripts/setup-vault.sh

      - name: Setup n8n accounts
        working-directory: tests
        run: bash scripts/setup-n8n-accounts.sh

      - name: Load test env
        working-directory: tests
        run: |
          if [ -f .test-env ]; then
            echo "Loading .test-env..."
            set -a && source .test-env && set +a
            # Export for subsequent steps
            cat .test-env >> $GITHUB_ENV
          fi

      - name: Run integration tests
        working-directory: tests/integration
        run: go test -v -timeout 300s -count=1 ./...

      - name: Collect logs on failure
        if: failure()
        working-directory: tests
        run: |
          echo "📋 Collecting container logs..."
          docker compose -f docker-compose.test.yaml logs --no-color > test-logs.txt
          docker compose -f docker-compose.test.yaml ps

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs-n8n-${{ inputs.n8n_version }}
          path: tests/test-logs.txt
          retention-days: 7

      - name: Tear down
        if: always()
        working-directory: tests
        run: docker compose -f docker-compose.test.yaml down -v --remove-orphans

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: E2E Browser Tests (Playwright)
  # ═══════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: '🌐 E2E Browser Tests (n8n ${{ inputs.n8n_version }})'
    if: inputs.test_scope == 'all' || inputs.test_scope == 'e2e'
    runs-on: ubuntu-latest
    needs: [unit-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start test environment
        working-directory: tests
        run: |
          echo "📦 Starting Knox test stack with n8n ${N8N_VERSION}..."
          docker compose -f docker-compose.test.yaml up -d --build

      - name: Wait for services
        working-directory: tests
        run: bash scripts/wait-for-services.sh

      - name: Setup Vault
        working-directory: tests
        run: bash scripts/setup-vault.sh

      - name: Setup n8n accounts
        working-directory: tests
        run: bash scripts/setup-n8n-accounts.sh

      - name: Load test env
        working-directory: tests
        run: |
          if [ -f .test-env ]; then
            set -a && source .test-env && set +a
            cat .test-env >> $GITHUB_ENV
          fi

      - name: Run E2E tests
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-n8n-${{ inputs.n8n_version }}
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7

      - name: Collect logs on failure
        if: failure()
        working-directory: tests
        run: |
          docker compose -f docker-compose.test.yaml logs --no-color > test-logs.txt
          docker compose -f docker-compose.test.yaml ps

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs-n8n-${{ inputs.n8n_version }}
          path: tests/test-logs.txt
          retention-days: 7

      - name: Tear down
        if: always()
        working-directory: tests
        run: docker compose -f docker-compose.test.yaml down -v --remove-orphans

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Test Summary
  # ═══════════════════════════════════════════════════════════════════════════
  test-summary:
    name: '📊 Test Summary'
    if: always()
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]

    steps:
      - name: Generate Summary
        run: |
          echo "## 🛡️ Knox Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**n8n Version:** \`${{ inputs.n8n_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Test Scope:** \`${{ inputs.test_scope }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | \`${{ needs.unit-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Integration Tests | \`${{ needs.integration-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 E2E Browser Tests | \`${{ needs.e2e-tests.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Artifacts (logs, screenshots, coverage) are available in the Actions tab._" >> $GITHUB_STEP_SUMMARY
