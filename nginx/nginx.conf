worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    upstream n8n_backend {
        server n8n:5678;
    }

    server {
        listen 80;
        server_name _;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Block webhook endpoints for security
        location /webhook { return 403 "Forbidden"; }
        location /webhook-test { return 403 "Forbidden"; }
        location /custom-assets/ {
            alias /usr/share/nginx/html/custom-assets/;
        }

        location /rest/push {
            proxy_pass http://n8n_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
        }

        location /rest/ {
            proxy_pass http://n8n_backend;
        }

        # ════════════════════════════════════════════════════════════════════
        # UI & Static Assets - CSS/JS Injection
        # ════════════════════════════════════════════════════════════════════
        location / {
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_set_header Accept-Encoding "";

            sub_filter '</head>' '<link rel="stylesheet" href="/custom-assets/knox-modal.css"><style>.el-notification { display: none !important; } .connection-lost { display: none !important; } [href*="settings"], [href*="credentials"], [href*="chat"], [href*="data-tables"], [href*="datatables"], [data-test-id*="settings"], [data-test-id*="credentials"], [data-test-id*="workflow-history"], [data-test-id*="save-workflow"], button[title*="History"], button[title*="Save"], span.tags, span.actions, [class*="sort-and-filter"] button, [class*="projectHeader"] button, button:has(svg[data-icon="plus"]), button:has(svg[data-icon="search"]) { display: none !important; } [class*="inlineRenameArea"] { pointer-events: none !important; user-select: none !important; }</style>__KNOX_JIT_PLACEHOLDER____KNOX_WATERMARK_PLACEHOLDER__</head>';

            sub_filter '</body>' '<script src="/custom-assets/knox-ui.js"></script><script>!function(){function e(){var p=window.location.pathname;if(p.startsWith("/settings")||p.startsWith("/credentials")){window.location.href="/home/workflows";return}if(!document.getElementById("custom-logout-btn")){for(var e=document.querySelectorAll("span, a, div"),t=null,n=0;n<e.length;n++)if(e[n].textContent&&"Help"===e[n].textContent.trim()){t=e[n].closest("a")||e[n];break}if(t&&t.parentNode){var o=t.cloneNode(!0);o.id="custom-logout-btn",o.href&&(o.href="#");var r=o.querySelectorAll("svg");if(r.length>0){var l=r[0];l.innerHTML="<path d=\\"M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4\\"></path><polyline points=\\"16 17 21 12 16 7\\"></polyline><line x1=\\"21\\" y1=\\"12\\" x2=\\"9\\" y2=\\"12\\"></line>",l.setAttribute("viewBox","0 0 24 24"),l.setAttribute("fill","none"),l.setAttribute("stroke","currentColor"),l.setAttribute("stroke-width","2");for(var c=1;c<r.length;c++)r[c].remove()}for(var i=document.createTreeWalker(o,NodeFilter.SHOW_TEXT,null,!1),a;a=i.nextNode();)"Help"===a.nodeValue.trim()&&(a.nodeValue="Logout");for(var d=o.querySelectorAll("[class*=\\"badge\\"], [class*=\\"indicator\\"], [class*=\\"dot\\"], [class*=\\"update\\"]"),u=0;u<d.length;u++)d[u].remove();o.addEventListener("click",(function(e){e.preventDefault(),e.stopPropagation(),window.location.href="/auth/logout"})),t.parentNode.insertBefore(o,t.nextSibling)}}}setInterval(e,500)}();</script></body>';

            sub_filter_once on;

            proxy_pass http://n8n_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
