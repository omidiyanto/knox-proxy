# ══════════════════════════════════════════════════════════════════════════════
# Knox Test Environment
# ══════════════════════════════════════════════════════════════════════════════
# Usage:
#   N8N_VERSION=2.13.3 docker compose -f docker-compose.test.yaml up -d --build
#
# Parameterized:
#   N8N_VERSION — n8n Docker tag (default: 2.13.3)
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Keycloak (OIDC Provider) ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/knox-realm.json:/opt/keycloak/data/import/knox-realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q 'HTTP/1.1 200' <&3"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - knox-test

  # ── Vault (Secret Management) ─────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: vault-test-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - knox-test

  # ── n8n Database ──────────────────────────────────────────────────────────
  n8n-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8nTestPass
      POSTGRES_DB: n8n
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - knox-test

  # ── n8n (version parameterized via N8N_VERSION) ───────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-2.13.3}
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-postgres
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8nTestPass
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - N8N_PORT=5678
    ports:
      - "5678:5678"
    depends_on:
      n8n-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 15s
    networks:
      - knox-test

  # ── Knox Database (JIT Ticketing) ─────────────────────────────────────────
  knox-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: knox
      POSTGRES_PASSWORD: knoxTestPass
      POSTGRES_DB: knox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knox"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - knox-test

  # ── Nginx (UI Injection Layer) ────────────────────────────────────────────
  nginx-knox:
    image: nginx:alpine
    entrypoint: ["/bin/sh", "/docker-entrypoint.d/knox-entrypoint.sh"]
    environment:
      - KNOX_JIT_ENABLED=true
      - KNOX_JIT_EDIT_ENABLED=true
      - KNOX_WATERMARK_ENABLED=true
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf.template:ro
      - ../nginx/entrypoint.sh:/docker-entrypoint.d/knox-entrypoint.sh:ro
      - ../nginx/knox-ui.js:/usr/share/nginx/html/custom-assets/knox-ui.js:ro
      - ../nginx/knox-modal.css:/usr/share/nginx/html/custom-assets/knox-modal.css:ro
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - knox-test

  # ── Knox Proxy (built from source) ────────────────────────────────────────
  knox-proxy:
    build:
      context: ../knox-proxy
      dockerfile: Dockerfile
    ports:
      - "8443:8443"
    environment:
      - PROXY_PORT=8443
      - N8N_BACKEND_URL=http://nginx-knox:80
      - N8N_INTERNAL_URL=http://n8n:5678
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/knox-test
      - OIDC_CLIENT_ID=knox-test
      - OIDC_CLIENT_SECRET=knox-test-secret
      - OIDC_REDIRECT_URL=http://localhost:8443/auth/callback
      - KEYCLOAK_GROUP_PREFIX=/n8n-test-
      - N8N_TEAM_CREDENTIALS={"testteam":{"email":"test@local","pass":"testPass123"}}
      - JIT_DATABASE_URL=postgres://knox:knoxTestPass@knox-db:5432/knox?sslmode=disable
      - KNOX_API_KEY=test-api-key-for-ci
      - COOKIE_TTL=300
      - SESSION_MAX_AGE=600
      - ENABLE_VAULT=false
      - VAULT_ADDR=http://vault:8200
      - KNOX_JIT_ENABLED=true
    depends_on:
      keycloak:
        condition: service_healthy
      n8n:
        condition: service_healthy
      nginx-knox:
        condition: service_started
      knox-db:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8443/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - knox-test

networks:
  knox-test:
    driver: bridge
